version: "3.8"

services:
  api:
    build: .
    volumes:
      - ./models:/app/models
      - ./api/uploads:/app/api/uploads
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

ui:
    build:
      context: .
      dockerfile: ui.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped